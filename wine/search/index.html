<script>
let allData = [];
let filtered = [];

async function loadData() {
  try {
    const res = await fetch('/wine/search_index.json');
    if (!res.ok) throw new Error('fetch failed');
    allData = await res.json();
  } catch(e) {
    allData = [];
  }
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const region = document.getElementById('regionFilter').value;
  const variety = document.getElementById('varietyFilter').value;

  // Update region shortcut highlight
  document.querySelectorAll('.region-tag').forEach(t => {
    t.classList.toggle('active', t.textContent === region);
  });

  if (!q && !region && !variety) {
    document.getElementById('resultsInfo').textContent = 'キーワードを入力するか、地域タグを選択してください';
    document.getElementById('resultGrid').innerHTML = '<div class="empty-state"><p>&#127863; 検索してワイナリーを見つけましょう</p><p style="font-size:13px;">880以上のワイナリーから探せます</p></div>';
    return;
  }

  filtered = allData.filter(w => {
    const name = (w.name || '').toLowerCase();
    const pref = (w.prefecture || w.region || '').toLowerCase();
    const varieties = (w.varieties || []).join(' ').toLowerCase();
    const desc = (w.desc || '').toLowerCase();
    const matchQ = !q || name.includes(q) || pref.includes(q) || varieties.includes(q) || desc.includes(q);
    const matchRegion = !region || pref.includes(region.toLowerCase()) || (w.region_label || '').includes(region);
    const matchVariety = !variety || varieties.includes(variety.toLowerCase());
    return matchQ && matchRegion && matchVariety;
  });

  renderResults(filtered);
}

function renderResults(data) {
  const grid = document.getElementById('resultGrid');
  const info = document.getElementById('resultsInfo');

  if (data.length === 0) {
    info.innerHTML = '検索結果: <span>0件</span>';
    grid.innerHTML = '<div class="empty-state"><p>該当するワイナリーが見つかりませんでした</p><p style="font-size:13px;">別のキーワードや地域でお試しください</p></div>';
    return;
  }

  info.innerHTML = '検索結果: <span>' + data.length + '件</span>';
  grid.innerHTML = data.slice(0, 60).map(w => {
    const tags = (w.varieties || []).slice(0,3).map(v => '<span>' + v + '</span>').join('');
    return '<div class="result-card"><div class="result-icon">&#127863;</div><div class="result-body"><h3>' + (w.name || '—') + '</h3><div class="result-meta"><span>' + (w.prefecture || w.region || '不明') + '</span>' + tags + '</div></div></div>';
  }).join('');
}

function setRegion(r) {
  document.getElementById('regionFilter').value = r;
  doSearch();
}

document.getElementById('searchInput').addEventListener('input', debounce(doSearch, 250));
document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key === 'Enter') doSearch(); });

function debounce(fn, ms) {
  let t;
  return function(...args) { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

loadData();
</script>
